{% extends "base.html" %}

{% block content %}
<h2>{{ _("Optimize Image") }}</h2>
{% if error %}
<div class="error">{{ error }}</div>
{% endif %}
<form action="/image" method="post" enctype="multipart/form-data">
    <div class="form-group">
        <label for="file">{{ _("Upload image") }}</label>
        <input type="file" name="file" id="file" accept=".jpg,.jpeg,.png,.webp" required>
    </div>

    <div class="form-group">
        <label for="output_format">{{ _("Output format") }}</label>
        <select name="output_format" id="output_format">
            <option value="webp">WEBP</option>
            <option value="jpg">JPG</option>
            <option value="png">PNG</option>
        </select>
    </div>

    <div class="form-group">
        <label for="quality">{{ _("Quality (1-100)") }}</label>
        <input type="number" name="quality" id="quality" value="75" min="1" max="100">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="max_width">{{ _("Max width (optional)") }}</label>
            <input type="number" name="max_width" id="max_width" min="1" placeholder="px">
        </div>
        <div class="form-group">
            <label for="max_height">{{ _("Max height (optional)") }}</label>
            <input type="number" name="max_height" id="max_height" min="1" placeholder="px">
        </div>
    </div>

    <fieldset>
        <legend>{{ _("Enhancements") }}</legend>
        <div class="form-group">
            <label for="contrast">Contrast (0.5–2.0)</label>
            <input type="number" name="contrast" id="contrast" value="1.0" step="0.1" min="0.5" max="2.0">
        </div>
        <div class="form-group">
            <label for="sharpness">Sharpness (0.5–2.0)</label>
            <input type="number" name="sharpness" id="sharpness" value="1.0" step="0.1" min="0.5" max="2.0">
        </div>
        <div class="form-group">
            <label for="brightness">Brightness (0.5–2.0)</label>
            <input type="number" name="brightness" id="brightness" value="1.0" step="0.1" min="0.5" max="2.0">
        </div>
    </fieldset>

    <button type="submit">{{ _("Optimize") }}</button>
</form>
{% endblock %}
